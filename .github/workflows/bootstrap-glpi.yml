name: Publicar blueprint completo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Preparar documentacao
        run: python .bootstrap/expand.py
      - name: Validar portal
        run: |
          pip install -r requirements.txt
          mkdocs build --strict
      - name: Registrar documentacao
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: publica blueprint completo do GLPI 11"
          git push origin main
      - name: Publicar portal
        run: mkdocs gh-deploy --force
